services:
  backend:
    build:
      context: .
      dockerfile: dockerfile/dockerfile.backend 
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=5000
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      dockerfile: dockerfile/dockerfile.frontend
      args:
        - VITE_API_URL=http://localhost:5000
    ports:
      - "5173:5173"
    depends_on:
      - backend